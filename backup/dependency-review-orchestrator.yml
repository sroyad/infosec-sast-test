name: "Dependency Review Orchestrator"

on:
  workflow_dispatch:
    inputs:
      auto_dismiss:
        description: 'Auto-dismiss false positives (true/false)'
        required: false
        type: boolean
        default: false
      max_alerts_per_repo:
        description: 'Maximum Dependabot alerts to process per repository'
        required: false
        type: string
        default: '300'
      max_repos:
        description: 'Maximum repositories to process (0 = all, -1 = use test_repos list)'
        required: false
        type: string
        default: '-1'
      org_name:
        description: 'Organization name to scan (default: uses GITHUB_REPOSITORY_OWNER)'
        required: false
        type: string
        default: ''
      use_test_repos:
        description: 'Use hardcoded repos list instead of discovery (true/false)'
        required: false
        type: boolean
        default: true  # Default to true to use hardcoded repos list
      cursor_model:
        description: 'Cursor model passed to cursor-agent (use a concrete model if auto fails with provider errors)'
        required: false
        type: string
        default: 'auto'
      matrix_max_parallel:
        description: 'Max parallel triage jobs (lower reduces Cursor API contention / resource_exhausted)'
        required: false
        type: number
        default: 2
      cursor_max_retries:
        description: 'Retries per Cursor call (Phase 1 and each alert in Phase 2)'
        required: false
        type: number
        default: 5
      cursor_retry_delay_sec:
        description: 'Initial backoff seconds between Cursor retries (doubles each attempt)'
        required: false
        type: number
        default: 20
      allow_phase1_fallback:
        description: 'If Phase 1 AI fails after retries, continue with a minimal manifest-based profile (lower quality)'
        required: false
        type: boolean
        default: false
      auto_dismiss_min_certainty:
        description: 'Minimum AI certainty (0-100) to PATCH-dismiss a false positive when auto_dismiss is true'
        required: false
        type: number
        default: 0
  schedule:
    - cron: "0 14 * * 0"  # Sundays 2:00 PM UTC (different from CodeQL triage)

permissions:
  contents: read              # Read repository files
  security-events: write      # Read/dismiss security alerts (write permission includes read)
  actions: read              # Read workflow information

jobs:
  discover-repos-with-dependabot-alerts:
    runs-on: appdirect-self-hosted-java-large-runner
    permissions:
      contents: read
      security-events: read    # Need read permission to discover alerts
      actions: read
    outputs:
      repos: ${{ steps.set-repos.outputs.repos }}
    steps:
      - name: Set up token
        id: token-setup
        run: |
          # Use PAT secret if available, otherwise use GITHUB_TOKEN
          if [ -n "${PAT_TOKEN}" ] && [ "${PAT_TOKEN}" != "" ]; then
            echo "🔑 Using Personal Access Token (PAT) from secret"
            echo "token=${PAT_TOKEN}" >> $GITHUB_OUTPUT
            TOKEN_TYPE="PAT"
          else
            echo "🔑 Using GITHUB_TOKEN (limited to current repository)"
            echo "⚠️  Note: GITHUB_TOKEN can only access the current repository."
            echo "⚠️  To access other repositories, create a secret named 'PAT_TOKEN' with a Personal Access Token."
            echo "token=${GITHUB_TOKEN}" >> $GITHUB_OUTPUT
            TOKEN_TYPE="GITHUB_TOKEN"
          fi
          echo "token_type=${TOKEN_TYPE}" >> $GITHUB_OUTPUT
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq curl

      - name: Verify GitHub token
        env:
          TOKEN: ${{ steps.token-setup.outputs.token }}
        run: |
          echo "🔐 Verifying GitHub token..."
          response=$(curl -s -w "\n%{http_code}" --max-time 60 \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user")
          
          http_code=$(echo "${response}" | tail -n1)
          body=$(echo "${response}" | head -n-1)
          
          if [ "${http_code}" = "200" ]; then
            username=$(echo "${body}" | jq -r '.login // "unknown"' 2>/dev/null || echo "unknown")
            echo "✅ GitHub token is valid (authenticated as: ${username}, type: ${{ steps.token-setup.outputs.token_type }})"
          else
            echo "⚠️ Warning: Token verification returned HTTP ${http_code}"
            echo "Response body: ${body}"
            echo "⚠️ Continuing anyway - actual API calls will validate the token"
          fi

      - name: Discover repositories with open Dependabot alerts
        id: discover
        env:
          ORG_NAME: ${{ inputs.org_name || github.repository_owner }}
          MAX_REPOS: ${{ inputs.max_repos || '-1' }}
          USE_TEST_REPOS: ${{ inputs.use_test_repos == true && 'true' || 'false' }}
