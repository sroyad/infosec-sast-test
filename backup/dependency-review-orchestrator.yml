          if [ "${USE_TEST_REPOS}" = "true" ]; then
            echo "📋 Using hardcoded repositories list (from ALLOWED_REPOS)"
            for repo in "${ALLOWED_REPOS[@]}"; do
              if [ -z "${repo}" ] || [[ "${repo}" =~ ^[[:space:]]*# ]]; then
                continue
              fi
              
              
              echo "🔍 Checking ${repo} for open Dependabot alerts..."
              # First, check if the repository exists and is accessible
              repo_check_response=$(curl -s -w "\n%{http_code}" --max-time 60 \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${repo}")
              
              repo_check_code=$(echo "${repo_check_response}" | tail -n1)
              repo_check_body=$(echo "${repo_check_response}" | head -n-1)
              
              if [ "${repo_check_code}" = "200" ]; then
                echo "✅ Repository ${repo} found."
              elif [ "${repo_check_code}" = "401" ]; then
                echo "❌ Authentication failed (HTTP 401) for ${repo}"
                echo "   This usually means GITHUB_TOKEN cannot access other repositories."
                echo "   💡 Solution: Provide a Personal Access Token (PAT) with 'repo' and 'security_events' scopes via the 'github_token' input."
                echo "   Skipping ${repo}"
                continue
              elif [ "${repo_check_code}" = "404" ]; then
                echo "⚠️ Repository ${repo} not found or no access, skipping. Response body: ${repo_check_body}"
                continue
              else
                echo "⚠️ Error checking repository ${repo} existence: HTTP ${repo_check_code}, skipping. Response body: ${repo_check_body}"
                continue
              fi

              # Check if Dependabot alerts are enabled for the repo
              dependabot_status_response=$(curl -s -w "\n%{http_code}" --max-time 60 \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${repo}/dependabot/alerts?per_page=1") # Just check if endpoint is accessible
              
              dependabot_status_code=$(echo "${dependabot_status_response}" | tail -n1)
              dependabot_status_body=$(echo "${dependabot_status_response}" | head -n-1)

              if [ "${dependabot_status_code}" = "403" ]; then
                echo "⚠️ Dependabot alerts are not enabled for ${repo} or token lacks 'security_events:read' permission, skipping. Response body: ${dependabot_status_body}"
                continue
              elif [ "${dependabot_status_code}" = "401" ]; then
                echo "❌ Authentication failed (HTTP 401) when checking Dependabot alerts for ${repo}"
                echo "   💡 Solution: Provide a Personal Access Token (PAT) with 'repo' and 'security_events' scopes via the 'github_token' input."
                echo "   Skipping ${repo}"
                continue
              elif [ "${dependabot_status_code}" != "200" ]; then
                echo "⚠️ Error checking Dependabot alerts status for ${repo}: HTTP ${dependabot_status_code}, skipping. Response body: ${dependabot_status_body}"
                continue
              fi
              
              # Check if repo has open Dependabot alerts
              alerts_response=$(curl -s -w "\n%{http_code}" --max-time 60 \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${repo}/dependabot/alerts?state=open&per_page=100")
              
              alerts_code=$(echo "${alerts_response}" | tail -n1)
              alerts_body=$(echo "${alerts_response}" | head -n-1)
              
              if [ "${alerts_code}" = "200" ]; then
                actual_count=$(echo "${alerts_body}" | jq 'if type == "array" then length else 0 end' || echo "0")
                
                if [ "${actual_count}" -gt 0 ]; then
                  echo "✅ Found ${actual_count} open Dependabot alerts in ${repo}"
                  repos_json=$(echo "${repos_json}" | jq --arg repo "${repo}" --arg count "${actual_count}" '. + [{"repo": $repo, "alert_count": ($count | tonumber)}]')
                else
                  echo "ℹ️  No open Dependabot alerts from Dependabot in ${repo}, skipping. Response body: ${alerts_body}"
                fi
              else
                echo "⚠️  Error fetching Dependabot alerts for ${repo}: HTTP ${alerts_code}, skipping. Response body: ${alerts_body}"
              fi
            done
          else
            # Dynamic discovery mode
            echo "🔍 Using dynamic discovery mode"
            page=1
            repos_found=0
          
          while [ "${repos_found}" -lt "${MAX_REPOS}" ] || [ "${MAX_REPOS}" = "0" ]; do
            # Get repos from organization
            response=$(curl -s -w "\n%{http_code}" --max-time 60 \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/orgs/${ORG_NAME}/repos?type=all&page=${page}&per_page=100&sort=updated")
            
            if [ "$(echo "${response}" | tail -n1)" = "401" ]; then
              echo "❌ Authentication failed (HTTP 401) when listing organization repositories"
              echo "   💡 Solution: Provide a Personal Access Token (PAT) with 'repo' scope via the 'github_token' input."
              break
            fi
            
            http_code=$(echo "${response}" | tail -n1)
            body=$(echo "${response}" | head -n-1)
            
            if [ "${http_code}" != "200" ]; then
              echo "⚠️ API error ${http_code}, stopping discovery"
              break
            fi
            
            repos_batch=$(echo "${body}" | jq -r '.[].full_name' || echo "")
            
            if [ -z "${repos_batch}" ] || [ "${repos_batch}" = "null" ]; then
              break
            fi
            
            # Check each repo for open Dependabot alerts
            while IFS= read -r repo_full_name; do
              if [ -z "${repo_full_name}" ]; then
                continue
              fi
              
              # Filter: Only process repos in the ALLOWED_REPOS whitelist
              is_allowed=false
              for allowed_repo in "${ALLOWED_REPOS[@]}"; do
                if [ "${repo_full_name}" = "${allowed_repo}" ]; then
                  is_allowed=true
                  break
                fi
              done
              
              if [ "${is_allowed}" = "false" ]; then
                echo "⏭️  Skipping ${repo_full_name} (not in allowed repos whitelist)"
                continue
              fi
              
              echo "🔍 Checking ${repo_full_name} for open Dependabot alerts..."

              # First, check if the repository exists and is accessible
              repo_check_response=$(curl -s -w "\n%{http_code}" --max-time 60 \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${repo_full_name}")
              
              repo_check_code=$(echo "${repo_check_response}" | tail -n1)
              repo_check_body=$(echo "${repo_check_response}" | head -n-1)
              
              if [ "${repo_check_code}" = "200" ]; then
                echo "✅ Repository ${repo_full_name} found."
              elif [ "${repo_check_code}" = "401" ]; then
                echo "❌ Authentication failed (HTTP 401) for ${repo_full_name}"
                echo "   💡 Solution: Provide a Personal Access Token (PAT) with 'repo' and 'security_events' scopes via the 'github_token' input."
                echo "   Skipping ${repo_full_name}"
                continue
              elif [ "${repo_check_code}" = "404" ]; then
                echo "⚠️ Repository ${repo_full_name} not found or no access, skipping. Response body: ${repo_check_body}"
                continue
              else
                echo "⚠️ Error checking repository ${repo_full_name} existence: HTTP ${repo_check_code}, skipping. Response body: ${repo_check_body}"
                continue
              fi

              # Check if Dependabot alerts are enabled for the repo
              dependabot_status_response=$(curl -s -w "\n%{http_code}" --max-time 60 \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${repo_full_name}/dependabot/alerts?per_page=1") # Just check if endpoint is accessible
              
              dependabot_status_code=$(echo "${dependabot_status_response}" | tail -n1)
              dependabot_status_body=$(echo "${dependabot_status_response}" | head -n-1)

              if [ "${dependabot_status_code}" = "403" ]; then
                echo "⚠️ Dependabot alerts are not enabled for ${repo_full_name} or token lacks 'security_events:read' permission, skipping. Response body: ${dependabot_status_body}"
                continue
              elif [ "${dependabot_status_code}" = "401" ]; then
                echo "❌ Authentication failed (HTTP 401) when checking Dependabot alerts for ${repo_full_name}"
                echo "   💡 Solution: Provide a Personal Access Token (PAT) with 'repo' and 'security_events' scopes via the 'github_token' input."
                echo "   Skipping ${repo_full_name}"
                continue
              elif [ "${dependabot_status_code}" != "200" ]; then
                echo "⚠️ Error checking Dependabot alerts status for ${repo_full_name}: HTTP ${dependabot_status_code}, skipping. Response body: ${dependabot_status_body}"
                continue
              fi

              # Check if repo has open Dependabot alerts
              alerts_response=$(curl -s -w "\n%{http_code}" --max-time 60 \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${repo_full_name}/dependabot/alerts?state=open&per_page=100")
              
              alerts_code=$(echo "${alerts_response}" | tail -n1)
              alerts_body=$(echo "${alerts_response}" | head -n-1)
              
              if [ "${alerts_code}" = "200" ]; then
                actual_count=$(echo "${alerts_body}" | jq 'if type == "array" then length else 0 end' || echo "0")
                
                if [ "${actual_count}" -gt 0 ]; then
                  echo "✅ Found ${actual_count} open Dependabot alerts in ${repo_full_name}"
                  repos_json=$(echo "${repos_json}" | jq --arg repo "${repo_full_name}" --arg count "${actual_count}" '. + [{"repo": $repo, "alert_count": ($count | tonumber)}]')
                  repos_found=$((repos_found + 1))
                  
                  if [ "${MAX_REPOS}" != "0" ] && [ "${repos_found}" -ge "${MAX_REPOS}" ]; then
                    break 2
                  fi
                else
                  echo "ℹ️  No open Dependabot alerts from Dependabot in ${repo_full_name}, skipping. Response body: ${alerts_body}"
                fi
              else
                echo "⚠️  Error fetching Dependabot alerts for ${repo_full_name}: HTTP ${alerts_code}, skipping. Response body: ${alerts_body}"
              fi
            done <<< "${repos_batch}"
            
            page=$((page + 1))
            done
          fi
          
          echo "${repos_json}" | jq .
          echo "📊 Total repositories with open Dependabot alerts: $(echo "${repos_json}" | jq 'length')"
          
          # Set output
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          echo "${repos_json}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Set repos output
        id: set-repos
        run: |
          repos='${{ steps.discover.outputs.repos }}'
          if [ -z "${repos}" ] || [ "${repos}" = "null" ] || [ "${repos}" = "" ]; then
            repos="[]"
          fi
          # Use multi-line EOF syntax for JSON arrays to avoid "Invalid format" errors
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          echo "${repos}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "📊 Repos to process: $(echo "${repos}" | jq 'length' || echo "0")"

  triage-dependabot-alerts:
    needs: discover-repos-with-dependabot-alerts
    if: needs.discover-repos-with-dependabot-alerts.outputs.repos != '[]' && needs.discover-repos-with-dependabot-alerts.outputs.repos != 'null' && needs.discover-repos-with-dependabot-alerts.outputs.repos != ''
    strategy:
      matrix:
        repo: ${{ fromJson(needs.discover-repos-with-dependabot-alerts.outputs.repos) }}
      fail-fast: false
      # github.event.inputs so schedule + workflow_dispatch both resolve defaults
      max-parallel: ${{ fromJSON(github.event.inputs.matrix_max_parallel || '2') }}
    runs-on: appdirect-self-hosted-java-large-runner
    timeout-minutes: 360
    permissions:
      contents: read
      security-events: write # Needed to dismiss alerts
    env:
      TARGET_REPO: ${{ matrix.repo.repo }}
      MAX_ALERTS: ${{ inputs.max_alerts_per_repo || '300' }}
      AUTO_DISMISS: ${{ inputs.auto_dismiss == true && 'true' || 'false' }}
    steps:
      - name: Parse repository owner and name
        id: parse-repo
        run: |
          REPO_FULL="${{ matrix.repo.repo }}"
          OWNER=$(echo "${REPO_FULL}" | cut -d'/' -f1)
          REPO=$(echo "${REPO_FULL}" | cut -d'/' -f2)
          
          echo "owner=${OWNER}" >> $GITHUB_OUTPUT
          echo "repo=${REPO}" >> $GITHUB_OUTPUT
          echo "📂 Processing: ${OWNER}/${REPO}"

      - name: Set up token for triage
        id: token-triage
        run: |
          # Use PAT secret if available, otherwise use GITHUB_TOKEN
          if [ -n "${PAT_TOKEN}" ] && [ "${PAT_TOKEN}" != "" ]; then
            echo "🔑 Using Personal Access Token (PAT) from secret for triage"
            echo "token=${PAT_TOKEN}" >> $GITHUB_OUTPUT
          else
            echo "🔑 Using GITHUB_TOKEN for triage"
            echo "token=${GITHUB_TOKEN}" >> $GITHUB_OUTPUT
          fi
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Checkout current repository (for script)
        uses: actions/checkout@v4
        with:
          path: .
          fetch-depth: 0
          submodules: false

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo.repo }}
          path: target-repo
          fetch-depth: 0
          token: ${{ steps.token-triage.outputs.token }}

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq curl python3

      - name: Install Cursor Agent CLI
        run: |
          curl -fsS https://cursor.com/install | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      - name: Validate Cursor
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_MODEL: ${{ github.event.inputs.cursor_model || 'auto' }}
        run: |
          cursor-agent --trust --print --model "${CURSOR_MODEL}" --output-format text "ping" >/dev/null
          echo "✅ Cursor agent ready"

      - name: Verify and prepare triage script
        run: |
          # Script is in the same repo as the workflow (automatically checked out by GitHub Actions)
          SCRIPT_PATH=".github/tools/dependabot_cursor_triage.sh"
          if [ ! -f "${SCRIPT_PATH}" ]; then
            echo "❌ Triage script not found at ${SCRIPT_PATH}"
            echo "📂 Current directory: $(pwd)"
            echo "📂 Available files in .github/tools/:"
            ls -la .github/tools/ || echo "Directory does not exist"
            exit 1
          fi
          chmod +x "${SCRIPT_PATH}"
          echo "✅ Triage script found and made executable at: $(realpath "${SCRIPT_PATH}")"

      - name: Run AI Triage on Dependabot alerts
        working-directory: target-repo
        env:
          OWNER: ${{ steps.parse-repo.outputs.owner }}
          REPO: ${{ steps.parse-repo.outputs.repo }}
          GITHUB_TOKEN: ${{ steps.token-triage.outputs.token }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_MODEL: ${{ github.event.inputs.cursor_model || 'auto' }}
          CURSOR_MAX_RETRIES: ${{ github.event.inputs.cursor_max_retries || '5' }}
          CURSOR_RETRY_DELAY_SEC: ${{ github.event.inputs.cursor_retry_delay_sec || '20' }}
          ALLOW_PHASE1_FALLBACK: ${{ github.event.inputs.allow_phase1_fallback == 'true' && 'true' || 'false' }}
          AUTO_DISMISS_MIN_CERTAINTY: ${{ github.event.inputs.auto_dismiss_min_certainty || '0' }}
          ALERT_STATE: "open"
          MAX_ALERTS: ${{ env.MAX_ALERTS }}
          AUTO_DISMISS: ${{ env.AUTO_DISMISS }}
        run: |
          echo "🤖 Starting AI triage for Dependabot alerts in ${OWNER}/${REPO}"
          echo "📊 Alert count: ${{ matrix.repo.alert_count }}"
          echo "📂 Working directory: $(pwd)"
          
          # Script is in the workspace root (same repo as workflow)
          # From target-repo, go up one level to workspace root
          SCRIPT_PATH="../.github/tools/dependabot_cursor_triage.sh"
          
          # Verify script exists before running
          if [ ! -f "${SCRIPT_PATH}" ]; then
            echo "❌ Script not found at ${SCRIPT_PATH}"
            echo "Current directory: $(pwd)"
            echo "Parent directory contents:"
            ls -la ../
            echo "Looking for script at: $(realpath "${SCRIPT_PATH}" 2>/dev/null || echo "path not found")"
            exit 1
          fi
          
          echo "✅ Script found at: $(realpath "${SCRIPT_PATH}")"
          
          # Run the triage script
          bash "${SCRIPT_PATH}"

      - name: Upload triage results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependabot-triage-results-${{ steps.parse-repo.outputs.owner }}-${{ steps.parse-repo.outputs.repo }}
          path: |
            target-repo/dependabot-triage-results.json
            target-repo/dependabot-triage-summary.json
            target-repo/repository_dependency_profile.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: Summary for repository
        if: always()
        run: |
          if [ -f "target-repo/dependabot-triage-summary.json" ]; then
            fetched=$(jq -r '.total_alerts_fetched' target-repo/dependabot-triage-summary.json)
            analyzed=$(jq -r '.alerts_analyzed' target-repo/dependabot-triage-summary.json)
            tp_count=$(jq -r '.true_positives' target-repo/dependabot-triage-summary.json)
            fp_count=$(jq -r '.false_positives_detected' target-repo/dependabot-triage-summary.json)
            uncertain=$(jq -r '.needs_review' target-repo/dependabot-triage-summary.json)
            dismissed_count=$(jq -r '.dismissed_via_api' target-repo/dependabot-triage-summary.json)
            echo "## 📊 Dependabot Triage: ${{ matrix.repo.repo }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|------:|" >> $GITHUB_STEP_SUMMARY
            echo "| Total alerts (open, fetched) | ${fetched} |" >> $GITHUB_STEP_SUMMARY
            echo "| Alerts analyzed end-to-end | ${analyzed} |" >> $GITHUB_STEP_SUMMARY
            echo "| True positives | ${tp_count} |" >> $GITHUB_STEP_SUMMARY
            echo "| False positives (AI-detected) | ${fp_count} |" >> $GITHUB_STEP_SUMMARY
            echo "| Needs review | ${uncertain} |" >> $GITHUB_STEP_SUMMARY
            echo "| Dismissed via API | ${dismissed_count} |" >> $GITHUB_STEP_SUMMARY
          elif [ -f "target-repo/dependabot-triage-results.json" ]; then
            total=$(jq 'length' target-repo/dependabot-triage-results.json)
            tp_count=$(jq '[.[] | select(.ai_label == "real_issue")] | length' target-repo/dependabot-triage-results.json)
            fp_count=$(jq '[.[] | select(.ai_label == "likely_false_positive")] | length' target-repo/dependabot-triage-results.json)
            dismissed_count=$(jq '[.[] | select(.dismissed == true)] | length' target-repo/dependabot-triage-results.json)
            echo "## 📊 Dependabot Triage Results: ${{ matrix.repo.repo }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Alerts analyzed:** ${total}" >> $GITHUB_STEP_SUMMARY
            echo "- **Real issues:** ${tp_count}" >> $GITHUB_STEP_SUMMARY
            echo "- **False positives (detected):** ${fp_count}" >> $GITHUB_STEP_SUMMARY
            echo "- **Dismissed via API:** ${dismissed_count}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No results file found for ${{ matrix.repo.repo }}" >> $GITHUB_STEP_SUMMARY
          fi

  final-summary:
    needs: [discover-repos-with-dependabot-alerts, triage-dependabot-alerts]
    if: always()
    runs-on: appdirect-self-hosted-java-large-runner
    steps:
      - name: Generate final summary
        run: |
          echo "# 🎉 Dependency Review Orchestrator Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repositories processed:** Check individual job results above" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Review triage results in artifacts" >> $GITHUB_STEP_SUMMARY
          echo "2. Check dismissed alerts in Security tab (Dependabot alerts) of each repository" >> $GITHUB_STEP_SUMMARY
          echo "3. Address real issues identified by AI triage" >> $GITHUB_STEP_SUMMARY

